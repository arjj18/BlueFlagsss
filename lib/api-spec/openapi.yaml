openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: quiz
    description: AI quiz generation
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /quiz/generate:
    post:
      operationId: generateQuiz
      tags: [quiz]
      summary: Generate AI quiz for a race
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizInput"
      responses:
        "200":
          description: Generated quiz questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: AI service unavailable (API key not configured)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    QuizInput:
      type: object
      properties:
        race:
          type: string
          minLength: 1
      required:
        - race
    QuizQuestion:
      type: object
      properties:
        q:
          type: string
        type:
          type: string
          description: Question format (standard, whoami, layout, image). Defaults to standard.
        image:
          type: string
          description: >-
            Optional image for the question. Either an absolute https URL to a
            real photo, or a "logo:<TeamName>" token resolved to a bundled team
            logo on the client. Rendered with a graceful fallback when it fails.
        opts:
          type: array
          items:
            type: string
        ans:
          type: integer
        fact:
          type: string
      required:
        - q
        - opts
        - ans
        - fact
    QuizResult:
      type: object
      properties:
        race:
          type: string
        questions:
          type: array
          items:
            $ref: "#/components/schemas/QuizQuestion"
      required:
        - race
        - questions
    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
